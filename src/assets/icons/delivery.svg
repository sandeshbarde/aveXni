<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64"
     fill="none">

    <defs>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD166"/>
            <stop offset="100%" stop-color="#F59E0B"/>
        </linearGradient>
    </defs>

    <!-- Circle -->
    <circle
        cx="32"
        cy="32"
        r="30"
        fill="#111827"
        stroke="url(#gold)"
        stroke-width="2"/>

    <!-- Delivery Truck -->
    <rect
        x="14"
        y="24"
        width="24"
        height="16"
        rx="2"
        stroke="url(#gold)"
        stroke-width="2.5"/>

    <path
        d="M38 28H46L50 33V40H38"
        stroke="url(#gold)"
        stroke-width="2.5"
        stroke-linejoin="round"/>

    <!-- Wheels -->
    <circle
        cx="22"
        cy="44"
        r="3"
        stroke="#FFFFFF"
        stroke-width="2"/>

    <circle
        cx="44"
        cy="44"
        r="3"
        stroke="#FFFFFF"
        stroke-width="2"/>

    <!-- Speed Lines -->
    <line
        x1="8"
        y1="28"
        x2="14"
        y2="28"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linecap="round"/>

    <line
        x1="6"
        y1="34"
        x2="14"
        y2="34"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linecap="round"/>

</svg>