<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64"
     fill="none">

    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD166"/>
            <stop offset="100%" stop-color="#F59E0B"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Circle Background -->
    <circle
        cx="32"
        cy="32"
        r="30"
        fill="#111827"
        stroke="url(#goldGradient)"
        stroke-width="2"/>

    <!-- Credit Card -->
    <rect
        x="15"
        y="20"
        width="34"
        height="24"
        rx="4"
        fill="none"
        stroke="url(#goldGradient)"
        stroke-width="2.8"
        filter="url(#glow)"/>

    <!-- Card Stripe -->
    <line
        x1="15"
        y1="28"
        x2="49"
        y2="28"
        stroke="#FFFFFF"
        stroke-width="2"/>

    <!-- Chip -->
    <rect
        x="20"
        y="33"
        width="8"
        height="6"
        rx="1"
        fill="url(#goldGradient)"/>

    <!-- Payment Dots -->
    <circle cx="39" cy="36" r="2" fill="#FFFFFF"/>
    <circle cx="45" cy="36" r="2" fill="#FFFFFF"/>

</svg>
