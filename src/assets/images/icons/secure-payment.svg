<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64"
     fill="none">

    <defs>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD166"/>
            <stop offset="50%" stop-color="#FBBF24"/>
            <stop offset="100%" stop-color="#F59E0B"/>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow
                dx="0"
                dy="3"
                stdDeviation="3"
                flood-color="#F59E0B"
                flood-opacity="0.45"/>
        </filter>
    </defs>

    <!-- Background -->
    <circle
        cx="32"
        cy="32"
        r="30"
        fill="#111827"
        stroke="url(#gold)"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Shield -->
    <path
        d="M32 14
           L46 20
           V30
           C46 40
           39 47
           32 50
           C25 47
           18 40
           18 30
           V20
           Z"
        fill="none"
        stroke="url(#gold)"
        stroke-width="2.5"
        stroke-linejoin="round"/>

    <!-- Lock Body -->
    <rect
        x="25"
        y="30"
        width="14"
        height="11"
        rx="2"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="2"/>

    <!-- Lock Shackle -->
    <path
        d="M28 30
           V27
           C28 24.8 29.8 23 32 23
           C34.2 23 36 24.8 36 27
           V30"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linecap="round"/>

    <!-- Keyhole -->
    <circle
        cx="32"
        cy="35"
        r="1.6"
        fill="url(#gold)"/>

</svg>