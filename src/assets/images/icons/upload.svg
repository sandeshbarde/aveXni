<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64"
     fill="none">

    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD166"/>
            <stop offset="100%" stop-color="#F59E0B"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Circle -->
    <circle
        cx="32"
        cy="32"
        r="30"
        fill="#111827"
        stroke="url(#goldGradient)"
        stroke-width="2"/>

    <!-- Upload Arrow -->
    <path
        d="M32 42V20"
        stroke="url(#goldGradient)"
        stroke-width="3.5"
        stroke-linecap="round"
        filter="url(#glow)"/>

    <path
        d="M24 28L32 20L40 28"
        stroke="url(#goldGradient)"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

    <!-- Bottom Line -->
    <path
        d="M20 46H44"
        stroke="#FFFFFF"
        stroke-width="3"
        stroke-linecap="round"/>

</svg>