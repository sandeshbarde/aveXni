<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64">

    <defs>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD166"/>
            <stop offset="50%" stop-color="#FBBF24"/>
            <stop offset="100%" stop-color="#F59E0B"/>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow
                dx="0"
                dy="3"
                stdDeviation="3"
                flood-color="#F59E0B"
                flood-opacity="0.45"/>
        </filter>
    </defs>

    <!-- Background -->
    <circle
        cx="32"
        cy="32"
        r="30"
        fill="#111827"
        stroke="url(#gold)"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Star -->
    <path
        d="M32 14
           L36.8 25.2
           L49 26.4
           L39.6 34.3
           L42.5 46.2
           L32 40
           L21.5 46.2
           L24.4 34.3
           L15 26.4
           L27.2 25.2
           Z"
        fill="url(#gold)"
        stroke="#FFF7D6"
        stroke-width="1.2"/>

</svg>