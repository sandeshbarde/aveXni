<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64"
     fill="none">

    <defs>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD166"/>
            <stop offset="50%" stop-color="#FBBF24"/>
            <stop offset="100%" stop-color="#F59E0B"/>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow
                dx="0"
                dy="3"
                stdDeviation="3"
                flood-color="#F59E0B"
                flood-opacity="0.45"/>
        </filter>
    </defs>

    <!-- Background -->
    <circle
        cx="32"
        cy="32"
        r="30"
        fill="#111827"
        stroke="url(#gold)"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Location Pin -->
    <path
        d="M32 15
           C25.4 15 20 20.4 20 27
           C20 36 32 49 32 49
           C32 49 44 36 44 27
           C44 20.4 38.6 15 32 15Z"
        fill="none"
        stroke="url(#gold)"
        stroke-width="2.5"
        stroke-linejoin="round"/>

    <!-- Center Dot -->
    <circle
        cx="32"
        cy="27"
        r="4"
        fill="#FFFFFF"/>

    <!-- Tracking Route -->
    <path
        d="M16 52
           C22 46 28 44 32 44
           C36 44 42 46 48 52"
        stroke="url(#gold)"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-dasharray="4 3"/>

</svg>
