<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64"
     fill="none">

    <defs>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD166"/>
            <stop offset="50%" stop-color="#FBBF24"/>
            <stop offset="100%" stop-color="#F59E0B"/>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow
                dx="0"
                dy="3"
                stdDeviation="3"
                flood-color="#F59E0B"
                flood-opacity="0.45"/>
        </filter>
    </defs>

    <!-- Background -->
    <circle
        cx="32"
        cy="32"
        r="30"
        fill="#111827"
        stroke="url(#gold)"
        stroke-width="2"
        filter="url(#shadow)"/>

    <!-- Coupon -->
    <path
        d="M18 22
           H46
           C46 24 48 25 50 25
           V39
           C48 39 46 40 46 42
           H18
           C18 40 16 39 14 39
           V25
           C16 25 18 24 18 22Z"
        fill="none"
        stroke="url(#gold)"
        stroke-width="2.5"
        stroke-linejoin="round"/>

    <!-- Dotted Line -->
    <line
        x1="32"
        y1="22"
        x2="32"
        y2="42"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-dasharray="3 3"/>

    <!-- Percentage Symbol -->
    <circle
        cx="26"
        cy="28"
        r="2"
        fill="#FFFFFF"/>

    <circle
        cx="38"
        cy="36"
        r="2"
        fill="#FFFFFF"/>

    <line
        x1="27"
        y1="37"
        x2="37"
        y2="27"
        stroke="url(#gold)"
        stroke-width="2.5"
        stroke-linecap="round"/>

</svg>