<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- ================= SEO ================= -->

  <title>aveXni | Handcrafted Memories Drawn Forever</title>

  <meta
    name="description"
    content="Premium Handmade Pencil Portraits by aveXni. Transform your favorite memories into timeless handcrafted artwork made by professional artists."
  />

  <meta
    name="keywords"
    content="handmade portrait, pencil portrait, custom sketch, portrait artist, aveXni, handmade drawing, custom gift"
  />

  <meta
    name="author"
    content="aveXni"
  />

  <meta
    name="theme-color"
    content="#0F172A"
  />

  <meta
    name="robots"
    content="index, follow"
  />

  <!-- ================= Icons ================= -->

  <link
    rel="icon"
    type="image/x-icon"
    href="/favicon.ico"
  />

  <link
    rel="apple-touch-icon"
    href="/apple-touch-icon.png"
  />

  <link
    rel="manifest"
    href="/manifest.json"
  />

  <!-- ================= Open Graph ================= -->

  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:title"
    content="aveXni | Handcrafted Memories Drawn Forever"
  />

  <meta
    property="og:description"
    content="Premium Handmade Pencil Portraits created by professional artists."
  />

  <meta
    property="og:image"
    content="/logo512.png"
  />

  <!-- Replace with your Vercel domain -->

  <meta
    property="og:url"
    content="https://YOUR-VERCEL-DOMAIN.vercel.app"
  />

  <!-- ================= Twitter ================= -->

  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="aveXni | Handcrafted Memories"
  />

  <meta
    name="twitter:description"
    content="Premium Handmade Pencil Portraits."
  />

  <meta
    name="twitter:image"
    content="/logo512.png"
  />

</head>

<body>

  <div id="root"></div>

  <script
    type="module"
    src="/src/main.jsx"
  ></script>

</body>

</html>
